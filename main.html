<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method="post">
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name">
		<br><br>
		
		<label for="email">Email</label>
		<input type="email" id="email" placeholder="Email">
		<br><br>
		
		<label for="gender_m">Male</label>
        <input type="radio" id="gender_m" name="gender" required>
        <label for="gender_f">Female</label>
        <input type="radio" id="gender_f" name="gender" required>
        <br><br>
		
		<label for="cars">Car Brands</label>
        <select id="cars" required>
            <option value="">--Please choose an option--</option>
            <option>BMW</option>
            <option>Mercedes</option>
            <option>Ferrari</option>
        </select>
		<br><br>
		
		<label for="age">Age</label>
		<input type="number" id="age" placeholder="Age">
		<br><br>
		
		<label for="dob">DOB</label>
		<input type="date" id="dob">
		<br><br>
		
		<label for="tel">Phone Number</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		<br><br>
		
		<label for="password">Password</label>
		<input type="password" id="password" placeholder="Password">
		<br><br>

		<label for="tos">I agree to the TOS</label>
		<input type="checkbox" id="tos">
		<br><br>

		<input type="submit" value="Submit">
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
